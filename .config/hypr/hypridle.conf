# ╔══════════════════════════════════════╗
# ║   HYPRIDLE · Idle daemon             ║
# ╚══════════════════════════════════════╝

general {
    lock_cmd = pidof hyprlock || hyprlock       # lock if not already locked
    before_sleep_cmd = loginctl lock-session    # lock before sleep
    after_sleep_cmd = hyprctl dispatch dpms on  # turn screen on after wake
}

# Dim screen after 2.5 minutes
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

# Lock screen after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
    on-resume = hyprctl dispatch dpms on
}

# Turn off screen after 6 minutes
listener {
    timeout = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
