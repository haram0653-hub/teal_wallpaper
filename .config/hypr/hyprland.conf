# ╔══════════════════════════════════════╗
# ║         HYPRLAND CONFIG              ║
# ║   Teal & Pink · Sharp · Anime        ║
# ╚══════════════════════════════════════╝

# ── Autostart ────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = hypridle

# ── Monitor ──────────────────────────────────────────────────
monitor = ,preferred,auto,1

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ── General ──────────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 16
    border_size = 1
    # Active: soft pink · Inactive: muted teal
    col.active_border = rgba(F2A7B8ff)
    col.inactive_border = rgba(6BBFB560)
    layout = dwindle
    resize_on_border = true
}

# ── Decoration ───────────────────────────────────────────────
decoration {
    rounding = 4

    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
        xray = false
    }

    shadow {
        enabled = true
        range = 24
        render_power = 2
        color = rgba(6BBFB525)
        color_inactive = rgba(6BBFB510)
    }

    inactive_opacity = 0.96
    active_opacity = 1.0
}

# ── Animations ───────────────────────────────────────────────
animations {
    enabled = true

    bezier = sharp,  0.16, 1,    0.3,  1
    bezier = linear, 0,    0,    1,    1
    bezier = snap,   0.68, -0.05, 0.27, 1.4

    animation = windows,          1, 4, sharp, slide
    animation = windowsOut,       1, 3, sharp, slide
    animation = border,           1, 6, linear
    animation = fade,             1, 4, sharp
    animation = workspaces,       1, 4, sharp, slide
    animation = specialWorkspace, 1, 4, sharp, slidevert
}

# ── Layout ───────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
}

master {
    new_status = master
}

# ── Misc ─────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
}

# ── Window Rules ─────────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin,   title:^(Picture-in-Picture)$
windowrulev2 = opacity 0.92, class:^(kitty)$

# ── Keybinds ─────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, Space, exec, rofi -show drun
bind = $mod, E, exec, rofi -show filebrowser

# Focus
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Resize
binde = $mod CTRL, right, resizeactive,  40 0
binde = $mod CTRL, left,  resizeactive, -40 0
binde = $mod CTRL, up,    resizeactive,  0 -40
binde = $mod CTRL, down,  resizeactive,  0  40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Scroll workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse window control
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot
bind = , Print,       exec, grimblast copy area
bind = SHIFT, Print,  exec, grimblast copy screen

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
