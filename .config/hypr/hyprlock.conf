# ╔══════════════════════════════════════╗
# ║   HYPRLOCK · Teal & Pink Anime       ║
# ╚══════════════════════════════════════╝

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# Blurred wallpaper background
background {
    monitor =
    path = ~/.config/hypr/wallpaper/wallpaper.png
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(239, 248, 247, 1.0)
    font_size = 72
    font_family = JetBrains Mono Light
    position = 0, 120
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(239, 248, 247, 0.80)
    font_size = 16
    font_family = JetBrains Mono
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

# Password input field
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 1
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(107, 191, 181, 0.80)
    inner_color = rgba(239, 248, 247, 0.12)
    font_color = rgba(239, 248, 247, 1.0)
    fade_on_empty = true
    placeholder_text = <i>password...</i>
    hide_input = false
    check_color = rgba(107, 191, 181, 1.0)
    fail_color = rgba(242, 167, 184, 1.0)
    fail_text = <i>incorrect</i>
    capslock_color = rgba(242, 167, 184, 0.80)
    position = 0, -80
    halign = center
    valign = center
}

# Username
label {
    monitor =
    text = $USER
    color = rgba(239, 248, 247, 0.70)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, -140
    halign = center
    valign = center
}
