# ╔══════════════════════════════════════╗
# ║   HYPRPAPER CONFIG                   ║
# ╚══════════════════════════════════════╝

# Place your wallpaper at: ~/.config/hypr/wallpaper.png
# Then update the paths below.

preload = ~/.config/hypr/wallpaper.png

wallpaper = ,~/.config/hypr/wallpaper.png

# Disable splash (no "hyprpaper" text)
splash = false

# IPC (allows runtime wallpaper changes)
ipc = on
