# ╔══════════════════════════════════════╗
# ║   KITTY · Teal & Pink Anime          ║
# ╚══════════════════════════════════════╝

# ── Font ─────────────────────────────────────────────────────
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
font_size        12.0
font_features    JetBrainsMono-Regular +liga +calt

# ── Cursor ───────────────────────────────────────────────────
cursor_shape                block
cursor_blink_interval       0
cursor_stop_blinking_after  0

# ── Scrollback ───────────────────────────────────────────────
scrollback_lines    4000

# ── Mouse ────────────────────────────────────────────────────
mouse_hide_wait     2.0
url_style           straight
open_url_with       default

# ── Performance ──────────────────────────────────────────────
repaint_delay   8
input_delay     2
sync_to_monitor yes

# ── Bell ─────────────────────────────────────────────────────
enable_audio_bell       no
visual_bell_duration    0

# ── Window ───────────────────────────────────────────────────
remember_window_size        no
initial_window_width        860
initial_window_height       540
window_padding_width        20
hide_window_decorations     yes
confirm_os_window_close     0

# ── Tabs ─────────────────────────────────────────────────────
tab_bar_style           separator
tab_separator           "  ·  "
tab_title_template      "{title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# ── Colors ───────────────────────────────────────────────────

# Backgrounds & foregrounds
background              #EFF8F7
foreground              #2C3E3D

selection_background    #F2A7B8
selection_foreground    #2C3E3D

cursor                  #F2A7B8
cursor_text_color       #2C3E3D

url_color               #6BBFB5

# Tab bar
active_tab_background   #EFF8F7
active_tab_foreground   #c47f93
inactive_tab_background #EFF8F7
inactive_tab_foreground #8BBAB6
tab_bar_background      #EFF8F7

# ANSI colors — teal & pink tinted
# Black
color0  #2C3E3D
color8  #5A7A78
# Red → pink
color1  #E88DA0
color9  #F2A7B8
# Green → teal
color2  #6BBFB5
color10 #8ED4CB
# Yellow → warm sand
color3  #C9A96E
color11 #DFC08A
# Blue → deep teal
color4  #4A9E96
color12 #6BBFB5
# Magenta → pink-purple
color5  #C490A8
color13 #DDB0C4
# Cyan → pale teal
color6  #7DCEC5
color14 #C9E8E5
# White
color7  #D9EFED
color15 #EFF8F7

# ── Keybinds ─────────────────────────────────────────────────
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+w    close_tab
map ctrl+tab        next_tab
map ctrl+shift+tab  previous_tab
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard
map ctrl+equal      increase_font_size
map ctrl+minus      decrease_font_size
map ctrl+0          restore_font_size

# ── Shell integration ────────────────────────────────────────
shell_integration   enabled
