# WOB config - Teal & Pink Anime
# Place at: ~/.config/wob/wob.ini

timeout = 1000
max = 100

margin = 20
padding = 4
border_size = 1
bar_padding = 2

width = 200
height = 24
anchor = bottom center

# Colors: background, border, bar (normal)
background_color = EFF8F7FF
border_color = 6BBFB5FF
bar_color = 6BBFB5FF

# Colors when overflowed (>100%)
overflow_background_color = EFF8F7FF
overflow_border_color = F2A7B8FF
overflow_bar_color = F2A7B8FF
